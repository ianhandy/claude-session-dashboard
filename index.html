<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Session Dashboard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#1A0D00;--bg2:#241200;--bg3:#2E1800;--bg4:#3A2200;
    --gold:#DDC165;--gold-light:#FFE9A3;--gold-dim:#8B7A3E;
    --orange:#E5591C;--orange-glow:rgba(229,89,28,.25);
    --text:#E8D5B5;--text-dim:#9B8A6E;--text-bright:#FFF5E6;
    --green:#4ADE80;--red:#F87171;--blue:#60A5FA;--purple:#C084FC;
    --border:#3A2200;--radius:8px;
    --font:'SF Mono',ui-monospace,'Cascadia Mono','Fira Code',monospace;
  }
  html{font-size:14px}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

  /* Layout */
  .app{display:grid;grid-template-rows:auto 1fr;height:100vh}
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .header h1{font-size:1.1rem;color:var(--gold);letter-spacing:.5px;white-space:nowrap}
  .header h1 span{color:var(--orange)}
  .header-actions{display:flex;gap:8px;margin-left:auto}
  .btn{background:var(--bg3);color:var(--gold);border:1px solid var(--border);padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:.85rem;transition:all .2s}
  .btn:hover{background:var(--bg4);border-color:var(--gold-dim)}
  .btn-primary{background:var(--orange);color:var(--text-bright);border-color:var(--orange)}
  .btn-primary:hover{background:#c94a15;box-shadow:0 0 20px var(--orange-glow)}

  .main{display:grid;grid-template-columns:280px 1fr;overflow:hidden}
  @media(max-width:768px){.main{grid-template-columns:1fr}.sidebar{display:none}.sidebar.open{display:block;position:fixed;inset:0;z-index:100;background:var(--bg)}}

  /* Sidebar */
  .sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
  .sidebar-title{padding:8px 16px;font-size:.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
  .session-item{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
  .session-item:hover{background:var(--bg3)}
  .session-item.active{background:var(--bg3);border-left-color:var(--orange)}
  .session-item .s-name{font-size:.8rem;color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .session-item .s-meta{font-size:.7rem;color:var(--text-dim);margin-top:2px;display:flex;gap:8px}
  .session-item .s-tokens{color:var(--orange);font-size:.7rem}

  /* Content area */
  .content{overflow-y:auto;padding:20px}

  /* Landing */
  .landing{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:20px}
  .landing-icon{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 40% 40%,var(--orange),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 0 60px var(--orange-glow);animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 40px var(--orange-glow)}50%{box-shadow:0 0 80px var(--orange-glow),0 0 120px rgba(229,89,28,.1)}}
  .landing h2{color:var(--gold);font-size:1.3rem}
  .landing p{color:var(--text-dim);max-width:400px;line-height:1.5}
  .landing .path-hint{font-size:.75rem;color:var(--text-dim);background:var(--bg3);padding:6px 12px;border-radius:var(--radius);margin-top:8px}

  /* Dashboard grid */
  .dashboard{display:grid;gap:16px}
  .dash-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--gold),var(--orange));opacity:.5}
  .card-title{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .card-value{font-size:1.8rem;color:var(--gold-light);font-weight:700}
  .card-sub{font-size:.75rem;color:var(--text-dim);margin-top:4px}
  .card-value.green{color:var(--green)}
  .card-value.orange{color:var(--orange)}
  .card-value.blue{color:var(--blue)}

  /* Charts */
  .chart-card{grid-column:1/-1}
  .chart-card canvas{width:100%;height:250px;display:block;border-radius:4px}
  .chart-card.tall canvas{height:400px}

  /* Timeline */
  .timeline{display:flex;flex-direction:column;gap:2px;max-height:500px;overflow-y:auto}
  .tl-item{display:grid;grid-template-columns:80px 100px 1fr auto;gap:8px;padding:6px 10px;border-radius:4px;font-size:.75rem;align-items:center;transition:background .15s}
  .tl-item:hover{background:var(--bg3)}
  .tl-time{color:var(--text-dim);font-variant-numeric:tabular-nums}
  .tl-tool{padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;display:inline-block;text-align:center}
  .tl-tool.Read{background:rgba(96,165,250,.15);color:var(--blue)}
  .tl-tool.Edit{background:rgba(74,222,128,.15);color:var(--green)}
  .tl-tool.Write{background:rgba(74,222,128,.15);color:var(--green)}
  .tl-tool.Bash{background:rgba(229,89,28,.15);color:var(--orange)}
  .tl-tool.Grep{background:rgba(192,132,252,.15);color:var(--purple)}
  .tl-tool.Glob{background:rgba(192,132,252,.15);color:var(--purple)}
  .tl-tool.Agent{background:rgba(221,193,101,.15);color:var(--gold)}
  .tl-tool.TodoWrite{background:rgba(248,113,113,.15);color:var(--red)}
  .tl-tool.default{background:rgba(221,193,101,.1);color:var(--gold-dim)}
  .tl-detail{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl-tokens{color:var(--text-dim);font-variant-numeric:tabular-nums;text-align:right}

  /* Tabs */
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
  .tab{padding:8px 16px;cursor:pointer;color:var(--text-dim);font-size:.8rem;border-bottom:2px solid transparent;transition:all .2s}
  .tab:hover{color:var(--gold)}
  .tab.active{color:var(--gold);border-bottom-color:var(--orange)}

  /* Agent tree */
  .agent-tree{padding:8px 0}
  .agent-node{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.8rem}
  .agent-node .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .agent-node .dot.main{background:var(--orange);box-shadow:0 0 8px var(--orange-glow)}
  .agent-node .dot.sub{background:var(--gold);box-shadow:0 0 6px rgba(221,193,101,.3)}
  .agent-indent{display:flex;align-items:stretch}
  .agent-indent .line{width:1px;background:var(--border);margin:0 20px}

  /* Cost breakdown */
  .cost-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.8rem;border-bottom:1px solid rgba(58,34,0,.5)}
  .cost-row:last-child{border:none;font-weight:600;color:var(--gold-light)}
  .cost-label{color:var(--text-dim)}
  .cost-val{color:var(--text);font-variant-numeric:tabular-nums}

  /* Filter bar */
  .filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .filter-chip{padding:3px 10px;border-radius:12px;font-size:.7rem;cursor:pointer;border:1px solid var(--border);color:var(--text-dim);transition:all .2s}
  .filter-chip:hover,.filter-chip.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(221,193,101,.08)}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--text-dim)}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Session header */
  .session-header{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .session-header h2{font-size:1.1rem;color:var(--gold)}
  .session-header .meta{font-size:.75rem;color:var(--text-dim)}
  .session-header .badge{padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600}
  .badge-model{background:rgba(229,89,28,.15);color:var(--orange)}
  .badge-branch{background:rgba(96,165,250,.15);color:var(--blue)}

  /* Summary bar */
  .summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
  .summary-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
  .summary-item .val{font-size:1.4rem;color:var(--gold-light);font-weight:700}
  .summary-item .label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

  /* No data */
  .no-data{text-align:center;padding:40px;color:var(--text-dim);font-style:italic}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span>&gt;_</span> Claude Session Dashboard</h1>
    <div class="header-actions">
      <button class="btn btn-primary" id="btnOpen">Open .claude Directory</button>
      <button class="btn" id="btnDemo">Load Demo</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-title">Sessions</div>
      <div id="sessionList"><div class="no-data" style="padding:20px">No sessions loaded</div></div>
    </div>
    <div class="content" id="content">
      <div class="landing" id="landing">
        <div class="landing-icon">&#x1f50d;</div>
        <h2>Claude Code Session Explorer</h2>
        <p>Visualize token usage, tool calls, agent hierarchies, and costs across all your Claude Code sessions.</p>
        <button class="btn btn-primary" id="btnOpenLanding">Select your ~/.claude directory</button>
        <div class="path-hint">~/.claude/projects/</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ───
const state = {
  sessions: [],        // [{id, name, project, entries, stats}]
  activeSession: null,
  activeTab: 'overview',
  toolFilter: null,
};

// ─── Pricing (per 1M tokens, March 2026 estimates) ───
const PRICING = {
  'claude-opus-4-6':         { input: 15, output: 75, cacheRead: 1.5, cacheWrite: 18.75 },
  'claude-sonnet-4-6':       { input: 3,  output: 15, cacheRead: 0.3, cacheWrite: 3.75  },
  'claude-haiku-4-5':        { input: 0.8, output: 4, cacheRead: 0.08, cacheWrite: 1    },
  'default':                 { input: 3,  output: 15, cacheRead: 0.3, cacheWrite: 3.75  },
};

function getPrice(model) {
  for (const key of Object.keys(PRICING)) {
    if (model && model.includes(key.replace('default',''))) return PRICING[key];
  }
  return PRICING['default'];
}

// ─── File Loading ───
async function openDirectory() {
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    await loadFromHandle(dirHandle);
  } catch(e) {
    if (e.name !== 'AbortError') console.error(e);
  }
}

async function loadFromHandle(dirHandle) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading sessions...</div>';

  const sessions = [];

  // Look for projects/ subdirectory
  let projectsDir;
  try {
    projectsDir = await dirHandle.getDirectoryHandle('projects');
  } catch {
    // Maybe user selected the projects dir directly
    projectsDir = dirHandle;
  }

  // Iterate project directories
  for await (const [name, handle] of projectsDir) {
    if (handle.kind !== 'directory') continue;
    // Each project dir contains session JSONL files
    for await (const [fname, fhandle] of handle) {
      if (fhandle.kind !== 'file' || !fname.endsWith('.jsonl')) continue;
      try {
        const file = await fhandle.getFile();
        const text = await file.text();
        const entries = text.trim().split('\n').filter(Boolean).map(l => {
          try { return JSON.parse(l); } catch { return null; }
        }).filter(Boolean);
        if (entries.length < 2) continue;

        const sessionId = entries[0].sessionId || fname.replace('.jsonl','');
        const projectName = name.replace(/-/g, '/').replace(/^\//, '');
        const stats = computeStats(entries);

        sessions.push({
          id: sessionId,
          name: fname.replace('.jsonl','').slice(0,8),
          project: projectName,
          entries,
          stats,
          file: fname,
        });
      } catch(e) { console.warn('Skip', fname, e); }
    }
  }

  // Sort by most recent first
  sessions.sort((a,b) => {
    const ta = a.stats.startTime || 0;
    const tb = b.stats.startTime || 0;
    return tb - ta;
  });

  state.sessions = sessions;
  renderSessionList();

  if (sessions.length > 0) {
    selectSession(sessions[0].id);
  } else {
    content.innerHTML = '<div class="no-data" style="padding:60px">No JSONL session files found.<br>Make sure you selected the <code>~/.claude</code> directory.</div>';
  }
}

// ─── Stats computation ───
function computeStats(entries) {
  let totalInput = 0, totalOutput = 0, totalCacheRead = 0, totalCacheWrite = 0;
  let toolCalls = [];
  let models = new Set();
  let startTime = null, endTime = null;
  let userMessages = 0, assistantMessages = 0;
  let textBlocks = [];
  let agents = [];
  let branch = null;

  for (const e of entries) {
    const ts = e.timestamp ? new Date(e.timestamp).getTime() : null;
    if (ts) {
      if (!startTime || ts < startTime) startTime = ts;
      if (!endTime || ts > endTime) endTime = ts;
    }

    if (e.gitBranch) branch = e.gitBranch;

    if (e.type === 'user') {
      userMessages++;
      // Check for tool_result content
      if (e.message?.content && Array.isArray(e.message.content)) {
        for (const block of e.message.content) {
          if (block.type === 'tool_result') {
            // tool results come back as user messages
          }
        }
      }
    }

    if (e.type === 'assistant' && e.message) {
      assistantMessages++;
      const msg = e.message;
      if (msg.model) models.add(msg.model);

      const usage = msg.usage || {};
      totalInput += usage.input_tokens || 0;
      totalOutput += usage.output_tokens || 0;
      totalCacheRead += usage.cache_read_input_tokens || 0;
      totalCacheWrite += usage.cache_creation_input_tokens || 0;

      if (msg.content && Array.isArray(msg.content)) {
        for (const block of msg.content) {
          if (block.type === 'tool_use') {
            toolCalls.push({
              name: block.name,
              timestamp: ts,
              input: block.input,
              id: block.id,
            });
          }
          if (block.type === 'text') {
            textBlocks.push({ text: block.text, timestamp: ts });
          }
        }
      }
    }
  }

  // Calculate cost
  const modelArr = [...models];
  const primaryModel = modelArr[0] || 'default';
  const price = getPrice(primaryModel);
  const cost = (
    (totalInput / 1e6) * price.input +
    (totalOutput / 1e6) * price.output +
    (totalCacheRead / 1e6) * price.cacheRead +
    (totalCacheWrite / 1e6) * price.cacheWrite
  );

  // Tool frequency
  const toolFreq = {};
  for (const tc of toolCalls) {
    toolFreq[tc.name] = (toolFreq[tc.name] || 0) + 1;
  }

  // Token timeline (cumulative over time)
  const tokenTimeline = [];
  let cumInput = 0, cumOutput = 0;
  for (const e of entries) {
    if (e.type === 'assistant' && e.message?.usage) {
      const u = e.message.usage;
      cumInput += (u.input_tokens || 0) + (u.cache_read_input_tokens || 0) + (u.cache_creation_input_tokens || 0);
      cumOutput += u.output_tokens || 0;
      const ts = e.timestamp ? new Date(e.timestamp).getTime() : null;
      if (ts) tokenTimeline.push({ time: ts, input: cumInput, output: cumOutput });
    }
  }

  return {
    totalInput, totalOutput, totalCacheRead, totalCacheWrite,
    totalTokens: totalInput + totalOutput + totalCacheRead + totalCacheWrite,
    toolCalls, models: modelArr, startTime, endTime,
    userMessages, assistantMessages, cost, toolFreq, tokenTimeline,
    textBlocks, branch, primaryModel,
    duration: startTime && endTime ? endTime - startTime : 0,
  };
}

// ─── Rendering ───
function renderSessionList() {
  const list = document.getElementById('sessionList');
  if (state.sessions.length === 0) {
    list.innerHTML = '<div class="no-data" style="padding:20px">No sessions</div>';
    return;
  }

  // Group by project
  const groups = {};
  for (const s of state.sessions) {
    const proj = s.project || 'unknown';
    if (!groups[proj]) groups[proj] = [];
    groups[proj].push(s);
  }

  let html = '';
  for (const [proj, sessions] of Object.entries(groups)) {
    const shortProj = proj.split('/').pop() || proj;
    html += `<div class="sidebar-title">${esc(shortProj)} (${sessions.length})</div>`;
    for (const s of sessions) {
      const date = s.stats.startTime ? new Date(s.stats.startTime).toLocaleDateString() : '—';
      const time = s.stats.startTime ? new Date(s.stats.startTime).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
      const tokens = formatNum(s.stats.totalTokens);
      const active = state.activeSession === s.id ? 'active' : '';
      html += `<div class="session-item ${active}" data-id="${s.id}">
        <div class="s-name">${esc(s.name)}</div>
        <div class="s-meta"><span>${date} ${time}</span><span class="s-tokens">${tokens} tok</span></div>
      </div>`;
    }
  }
  list.innerHTML = html;

  list.querySelectorAll('.session-item').forEach(el => {
    el.addEventListener('click', () => selectSession(el.dataset.id));
  });
}

function selectSession(id) {
  state.activeSession = id;
  state.activeTab = 'overview';
  renderSessionList(); // update active highlight
  renderDashboard();
}

function renderDashboard() {
  const session = state.sessions.find(s => s.id === state.activeSession);
  if (!session) return;
  const s = session.stats;
  const content = document.getElementById('content');

  const startDate = s.startTime ? new Date(s.startTime).toLocaleString() : 'Unknown';
  const durationStr = formatDuration(s.duration);

  content.innerHTML = `
    <div class="session-header">
      <h2>${esc(session.name)}</h2>
      <span class="meta">${startDate} &middot; ${durationStr}</span>
      ${s.primaryModel ? `<span class="badge badge-model">${esc(s.primaryModel)}</span>` : ''}
      ${s.branch ? `<span class="badge badge-branch">${esc(s.branch)}</span>` : ''}
    </div>

    <div class="tabs">
      <div class="tab ${state.activeTab==='overview'?'active':''}" data-tab="overview">Overview</div>
      <div class="tab ${state.activeTab==='timeline'?'active':''}" data-tab="timeline">Tool Timeline</div>
      <div class="tab ${state.activeTab==='tokens'?'active':''}" data-tab="tokens">Token Burn</div>
      <div class="tab ${state.activeTab==='cost'?'active':''}" data-tab="cost">Cost</div>
    </div>

    <div id="tabContent"></div>
  `;

  content.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      state.activeTab = t.dataset.tab;
      renderDashboard();
    });
  });

  const tabContent = document.getElementById('tabContent');
  switch(state.activeTab) {
    case 'overview': renderOverview(tabContent, s); break;
    case 'timeline': renderTimeline(tabContent, s); break;
    case 'tokens': renderTokenBurn(tabContent, s); break;
    case 'cost': renderCostTab(tabContent, s); break;
  }
}

function renderOverview(el, s) {
  const toolNames = Object.keys(s.toolFreq).sort((a,b) => s.toolFreq[b] - s.toolFreq[a]);

  el.innerHTML = `
    <div class="summary-bar">
      <div class="summary-item"><div class="val">${formatNum(s.totalTokens)}</div><div class="label">Total Tokens</div></div>
      <div class="summary-item"><div class="val" style="color:var(--blue)">${formatNum(s.totalInput + s.totalCacheRead + s.totalCacheWrite)}</div><div class="label">Input Tokens</div></div>
      <div class="summary-item"><div class="val" style="color:var(--green)">${formatNum(s.totalOutput)}</div><div class="label">Output Tokens</div></div>
      <div class="summary-item"><div class="val" style="color:var(--orange)">$${s.cost.toFixed(4)}</div><div class="label">Est. Cost</div></div>
      <div class="summary-item"><div class="val" style="color:var(--purple)">${s.toolCalls.length}</div><div class="label">Tool Calls</div></div>
      <div class="summary-item"><div class="val">${s.userMessages}</div><div class="label">Turns</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">Tool Usage Distribution</div>
        <canvas id="chartToolDist" height="250"></canvas>
      </div>
      <div class="card">
        <div class="card-title">Token Composition</div>
        <canvas id="chartTokenComp" height="250"></canvas>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-title">Tool Frequency</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${toolNames.map(t => `<div style="display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg3);border-radius:4px">
          <span class="tl-tool ${toolClass(t)}" style="font-size:.7rem">${esc(t)}</span>
          <span style="color:var(--text);font-size:.8rem;font-weight:600">${s.toolFreq[t]}</span>
        </div>`).join('')}
      </div>
    </div>
  `;

  // Draw tool distribution chart
  setTimeout(() => {
    drawToolDistChart('chartToolDist', s);
    drawTokenCompChart('chartTokenComp', s);
  }, 0);
}

function renderTimeline(el, s) {
  const allTools = [...new Set(s.toolCalls.map(t => t.name))].sort();
  const filtered = state.toolFilter
    ? s.toolCalls.filter(t => t.name === state.toolFilter)
    : s.toolCalls;

  el.innerHTML = `
    <div class="filter-bar">
      <div class="filter-chip ${!state.toolFilter?'active':''}" data-tool="">All (${s.toolCalls.length})</div>
      ${allTools.map(t => `<div class="filter-chip ${state.toolFilter===t?'active':''}" data-tool="${t}">${t} (${s.toolFreq[t]})</div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Tool Call Timeline (${filtered.length} calls)</div>
      <div class="timeline" id="timeline"></div>
    </div>
  `;

  el.querySelectorAll('.filter-chip').forEach(c => {
    c.addEventListener('click', () => {
      state.toolFilter = c.dataset.tool || null;
      renderTimeline(el, s);
    });
  });

  const timeline = document.getElementById('timeline');
  let html = '';
  for (const tc of filtered) {
    const time = tc.timestamp ? new Date(tc.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '—';
    let detail = '';
    if (tc.input) {
      if (tc.name === 'Read' && tc.input.file_path) detail = tc.input.file_path.split('/').slice(-2).join('/');
      else if (tc.name === 'Edit' && tc.input.file_path) detail = tc.input.file_path.split('/').slice(-2).join('/');
      else if (tc.name === 'Write' && tc.input.file_path) detail = tc.input.file_path.split('/').slice(-2).join('/');
      else if (tc.name === 'Bash' && tc.input.command) detail = tc.input.command.slice(0, 80);
      else if (tc.name === 'Grep' && tc.input.pattern) detail = `/${tc.input.pattern}/`;
      else if (tc.name === 'Glob' && tc.input.pattern) detail = tc.input.pattern;
      else if (tc.name === 'Agent' && tc.input.description) detail = tc.input.description;
      else if (tc.name === 'TodoWrite') detail = 'Update tasks';
      else detail = JSON.stringify(tc.input).slice(0, 60);
    }
    html += `<div class="tl-item">
      <span class="tl-time">${time}</span>
      <span class="tl-tool ${toolClass(tc.name)}">${esc(tc.name)}</span>
      <span class="tl-detail" title="${esc(detail)}">${esc(detail)}</span>
      <span class="tl-tokens"></span>
    </div>`;
  }
  timeline.innerHTML = html || '<div class="no-data">No tool calls</div>';
}

// ─── Canvas Charts ───
function drawToolDistChart(canvasId, s) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const tools = Object.entries(s.toolFreq).sort((a,b) => b[1] - a[1]).slice(0, 12);
  if (tools.length === 0) { ctx.fillStyle = '#9B8A6E'; ctx.fillText('No tool calls', W/2 - 30, H/2); return; }

  const maxVal = Math.max(...tools.map(t => t[1]));
  const barH = Math.min(28, (H - 40) / tools.length - 4);
  const leftPad = 90, rightPad = 40;
  const barW = W - leftPad - rightPad;

  const colors = { Read: '#60A5FA', Edit: '#4ADE80', Write: '#4ADE80', Bash: '#E5591C', Grep: '#C084FC', Glob: '#C084FC', Agent: '#DDC165', TodoWrite: '#F87171' };

  tools.forEach(([name, count], i) => {
    const y = 20 + i * (barH + 4);
    const w = (count / maxVal) * barW;
    const color = colors[name] || '#DDC165';

    // Bar
    ctx.fillStyle = color + '30';
    ctx.beginPath();
    roundRect(ctx, leftPad, y, w, barH, 3);
    ctx.fill();

    ctx.fillStyle = color;
    ctx.beginPath();
    roundRect(ctx, leftPad, y, w, barH, 3);
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Label
    ctx.fillStyle = '#E8D5B5';
    ctx.font = '11px ' + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, leftPad - 8, y + barH/2);

    // Count
    ctx.fillStyle = '#9B8A6E';
    ctx.textAlign = 'left';
    ctx.fillText(count.toString(), leftPad + w + 6, y + barH/2);
  });
}

function drawTokenCompChart(canvasId, s) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const data = [
    { label: 'Input', value: s.totalInput, color: '#60A5FA' },
    { label: 'Output', value: s.totalOutput, color: '#4ADE80' },
    { label: 'Cache Read', value: s.totalCacheRead, color: '#C084FC' },
    { label: 'Cache Write', value: s.totalCacheWrite, color: '#E5591C' },
  ].filter(d => d.value > 0);

  const total = data.reduce((a,d) => a + d.value, 0);
  if (total === 0) return;

  const cx = W/2, cy = H/2 - 10, r = Math.min(W, H) * 0.32;
  let startAngle = -Math.PI/2;

  data.forEach(d => {
    const sweep = (d.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + sweep);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Label
    if (sweep > 0.15) {
      const mid = startAngle + sweep/2;
      const lx = cx + Math.cos(mid) * r * 0.65;
      const ly = cy + Math.sin(mid) * r * 0.65;
      ctx.fillStyle = '#1A0D00';
      ctx.font = 'bold 11px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(Math.round(d.value/total*100) + '%', lx, ly);
    }

    startAngle += sweep;
  });

  // Inner circle (donut)
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#241200';
  ctx.fill();

  // Center text
  ctx.fillStyle = '#FFE9A3';
  ctx.font = 'bold 16px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(formatNum(total), cx, cy - 6);
  ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = '#9B8A6E';
  ctx.fillText('total tokens', cx, cy + 10);

  // Legend
  const legendY = H - 20;
  let lx = 10;
  data.forEach(d => {
    ctx.fillStyle = d.color;
    ctx.fillRect(lx, legendY, 8, 8);
    ctx.fillStyle = '#E8D5B5';
    ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = 'left';
    ctx.fillText(d.label, lx + 12, legendY + 7);
    lx += ctx.measureText(d.label).width + 24;
  });
}

function drawBurnChart(canvasId, s) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const tl = s.tokenTimeline;
  if (tl.length < 2) { ctx.fillStyle = '#9B8A6E'; ctx.fillText('Not enough data', W/2 - 40, H/2); return; }

  const pad = { top: 20, right: 20, bottom: 40, left: 70 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  const minTime = tl[0].time;
  const maxTime = tl[tl.length-1].time;
  const maxTokens = Math.max(...tl.map(p => p.input + p.output));

  function x(t) { return pad.left + ((t - minTime) / (maxTime - minTime || 1)) * plotW; }
  function y(v) { return pad.top + plotH - (v / (maxTokens || 1)) * plotH; }

  // Grid
  ctx.strokeStyle = '#2E1800';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const gy = pad.top + (plotH / 5) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(W - pad.right, gy); ctx.stroke();
    const val = maxTokens - (maxTokens / 5) * i;
    ctx.fillStyle = '#9B8A6E';
    ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = 'right';
    ctx.fillText(formatNum(Math.round(val)), pad.left - 8, gy + 4);
  }

  // Total (input + output) area fill
  ctx.beginPath();
  ctx.moveTo(x(tl[0].time), y(0));
  tl.forEach(p => ctx.lineTo(x(p.time), y(p.input + p.output)));
  ctx.lineTo(x(tl[tl.length-1].time), y(0));
  ctx.closePath();
  const totalGrad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
  totalGrad.addColorStop(0, 'rgba(229,89,28,0.3)');
  totalGrad.addColorStop(1, 'rgba(229,89,28,0.02)');
  ctx.fillStyle = totalGrad;
  ctx.fill();

  // Total line
  ctx.beginPath();
  tl.forEach((p, i) => { i === 0 ? ctx.moveTo(x(p.time), y(p.input + p.output)) : ctx.lineTo(x(p.time), y(p.input + p.output)); });
  ctx.strokeStyle = '#E5591C';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Input area fill
  ctx.beginPath();
  ctx.moveTo(x(tl[0].time), y(0));
  tl.forEach(p => ctx.lineTo(x(p.time), y(p.input)));
  ctx.lineTo(x(tl[tl.length-1].time), y(0));
  ctx.closePath();
  const inputGrad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
  inputGrad.addColorStop(0, 'rgba(96,165,250,0.2)');
  inputGrad.addColorStop(1, 'rgba(96,165,250,0.02)');
  ctx.fillStyle = inputGrad;
  ctx.fill();

  // Input line
  ctx.beginPath();
  tl.forEach((p, i) => { i === 0 ? ctx.moveTo(x(p.time), y(p.input)) : ctx.lineTo(x(p.time), y(p.input)); });
  ctx.strokeStyle = '#60A5FA';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Time labels
  ctx.fillStyle = '#9B8A6E';
  ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  const steps = Math.min(6, tl.length);
  for (let i = 0; i < steps; i++) {
    const idx = Math.floor(i / (steps-1) * (tl.length - 1));
    const t = new Date(tl[idx].time);
    ctx.fillText(t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), x(tl[idx].time), H - pad.bottom + 16);
  }

  // Legend
  const legends = [{label:'Total (Input+Output)',color:'#E5591C'},{label:'Input',color:'#60A5FA'}];
  let lx = pad.left;
  legends.forEach(l => {
    ctx.fillStyle = l.color;
    ctx.fillRect(lx, H - 12, 12, 3);
    ctx.fillStyle = '#9B8A6E';
    ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = 'left';
    ctx.fillText(l.label, lx + 16, H - 8);
    lx += ctx.measureText(l.label).width + 32;
  });
}

function drawCostBreakdownChart(canvasId, inputCost, outputCost, cacheReadCost, cacheWriteCost) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const data = [
    { label: 'Input', value: inputCost, color: '#60A5FA' },
    { label: 'Output', value: outputCost, color: '#4ADE80' },
    { label: 'Cache Read', value: cacheReadCost, color: '#C084FC' },
    { label: 'Cache Write', value: cacheWriteCost, color: '#E5591C' },
  ].filter(d => d.value > 0.00001);

  const maxVal = Math.max(...data.map(d => d.value));
  if (maxVal === 0) return;

  const barW = Math.min(60, (W - 80) / data.length - 20);
  const spacing = (W - 40) / data.length;
  const plotH = H - 60;

  data.forEach((d, i) => {
    const cx = 20 + spacing * i + spacing/2;
    const h = (d.value / maxVal) * plotH;
    const by = H - 40 - h;

    ctx.fillStyle = d.color + '40';
    roundRect(ctx, cx - barW/2, by, barW, h, 4);
    ctx.fill();

    ctx.fillStyle = d.color;
    ctx.globalAlpha = 0.8;
    roundRect(ctx, cx - barW/2, by, barW, h, 4);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Value
    ctx.fillStyle = '#FFE9A3';
    ctx.font = 'bold 11px ' + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = 'center';
    ctx.fillText('$' + d.value.toFixed(4), cx, by - 6);

    // Label
    ctx.fillStyle = '#9B8A6E';
    ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillText(d.label, cx, H - 20);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── Utilities ───
function formatNum(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

function formatDuration(ms) {
  if (ms < 60000) return Math.round(ms / 1000) + 's';
  if (ms < 3600000) return Math.round(ms / 60000) + 'm';
  const h = Math.floor(ms / 3600000);
  const m = Math.round((ms % 3600000) / 60000);
  return `${h}h ${m}m`;
}

function toolClass(name) {
  return ['Read','Edit','Write','Bash','Grep','Glob','Agent','TodoWrite'].includes(name) ? name : 'default';
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
